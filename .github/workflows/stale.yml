name: Stale Issues

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  actions: write
  issues: write
  pull-requests: read

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10.2.0
        with:
          days-before-stale: 60
          days-before-close: -1
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity for 60 days. It will not be closed automatically — if this
            issue is still relevant, please leave a comment or remove the stale label.
          exempt-issue-labels: pinned
          days-before-pr-stale: -1